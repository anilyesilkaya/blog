<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 396 184"
     width="396" height="184" role="img"
     aria-label="One object O1 resting on a surface"
     style="max-width:100%;height:auto;color:currentColor;">
  <!-- Object O1 -->
  <g>
    <ellipse cx="200" cy="80" rx="80" ry="80"
             fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
    <text x="200" y="88" text-anchor="middle"
          font-family="Helvetica, sans-serif" font-size="40"
          font-weight="700" fill="currentColor">A</text>
  </g>

  <!-- Surface line (theme-aware) -->
  <path d="M 10 160 L 390 160"
        fill="none" stroke="currentColor" stroke-width="6"
        stroke-linecap="round"/>

  <!-- Surface hatching (theme-aware) -->
  <g fill="none" stroke="currentColor" stroke-width="2"
