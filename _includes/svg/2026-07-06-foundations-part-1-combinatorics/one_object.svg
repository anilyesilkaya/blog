    <path d="M 20 180 L 40 160"/>
    <path d="M 40 180 L 60 160"/>
    <path d="M 60 180 L 80 160"/>
    <path d="M 80 180 L 100 160"/>
    <path d="M 100 180 L 120 160"/>
    <path d="M 120 180 L 140 160"/>
    <path d="M 140 180 L 160 160"/>
    <path d="M 160 180 L 180 160"/>
    <path d="M 180 180 L 200 160"/>
    <path d="M 200 180 L 220 160"/>
    <path d="M 220 180 L 240 160"/>
    <path d="M 240 180 L 260 160"/>
    <path d="M 260 180 L 280 160"/>
    <path d="M 280 180 L 300 160"/>
    <path d="M 300 180 L 320 160"/>
    <path d="M 320 180 L 340 160"/>
    <path d="M 340 180 L 360 160"/>
    <path d="M 360 180 L 380 160"/>
  </g>
</svg>
